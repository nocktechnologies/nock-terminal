name: Anvil (Codex Security Review)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  anvil-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex@0.118.0

      - name: Run Codex security review
        id: anvil
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ -z "${OPENAI_API_KEY:-}" || "${OPENAI_API_KEY}" != sk-* ]]; then
            {
              echo 'review<<ANVIL_REVIEW_EOF'
              echo 'OPENAI_API_KEY secret is missing or not an OpenAI API key; skipped Anvil security review.'
              echo 'ANVIL_REVIEW_EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          auth_status="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            https://api.openai.com/v1/models || true)"
          if [ "$auth_status" != "200" ]; then
            {
              echo 'review<<ANVIL_REVIEW_EOF'
              echo "OPENAI_API_KEY did not pass OpenAI auth preflight (HTTP ${auth_status}); skipped Anvil security review."
              echo 'ANVIL_REVIEW_EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! NO_COLOR=1 codex debug models -c model="o4-mini" > /tmp/anvil-auth-check.txt 2>&1; then
            {
              echo 'review<<ANVIL_REVIEW_EOF'
              echo 'Codex CLI auth preflight failed; skipped Anvil security review.'
              echo 'ANVIL_REVIEW_EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NO_COLOR=1 codex review \
            --base "$PR_BASE_REF" \
            --title "Security-focused adversarial review for PR #${PR_NUMBER}: ${PR_TITLE}" \
            -c model="o4-mini" \
            -c 'sandbox_permissions=["disk-full-read-access"]' \
            > /tmp/anvil-output.txt 2>&1 || true
          {
            echo 'review<<ANVIL_REVIEW_EOF'
            head -c 60000 /tmp/anvil-output.txt
            echo 'ANVIL_REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Anvil review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.anvil.outputs.review }}`;
            const body = [
              '## 🔨 Anvil Security Review (Codex)',
              '',
              '```',
              output || 'No output captured — verify OPENAI_API_KEY secret is set on this repo.',
              '```',
              '',
              '*Adversarial security audit powered by OpenAI Codex o4-mini. Does not replace human review.*',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
