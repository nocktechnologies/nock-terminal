name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:check

  build-mac:
    name: Build macOS (signed)
    runs-on: macos-latest
    needs: preflight
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify macOS signing and notarization secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$MACOS_CERTIFICATE"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Build React frontend
        run: npx vite build

      - name: Check bundle budget
        run: npm run check:bundle

      - name: Build + sign macOS DMG
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      - name: Write macOS checksums
        run: shasum -a 256 dist/*.dmg > dist/nock-terminal-mac.SHA256SUMS

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nock-terminal-mac
          path: |
            dist/*.dmg
            dist/nock-terminal-mac.SHA256SUMS

  build-win:
    name: Build Windows (signed NSIS installer)
    runs-on: windows-latest
    needs: preflight
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Windows signing secrets
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          test -n "$WINDOWS_CERTIFICATE"
          test -n "$WINDOWS_CERTIFICATE_PASSWORD"

      - name: Build React frontend
        run: npx vite build

      - name: Check bundle budget
        run: npm run check:bundle

      - name: Build Windows installer
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Write Windows checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.exe | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)"
          } | Set-Content dist/nock-terminal-win.SHA256SUMS

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nock-terminal-win
          path: |
            dist/*.exe
            dist/nock-terminal-win.SHA256SUMS

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React frontend
        run: npx vite build

      - name: Check bundle budget
        run: npm run check:bundle

      - name: Build Linux artifacts
        run: npx electron-builder --linux --publish never

      - name: Write Linux checksums
        run: sha256sum dist/*.AppImage dist/*.deb > dist/nock-terminal-linux.SHA256SUMS

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nock-terminal-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/nock-terminal-linux.SHA256SUMS

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-linux]
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nock-terminal-mac
          path: dist/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nock-terminal-win
          path: dist/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nock-terminal-linux
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/mac/*.dmg
            dist/mac/*.SHA256SUMS
            dist/win/*.exe
            dist/win/*.SHA256SUMS
            dist/linux/*.AppImage
            dist/linux/*.deb
            dist/linux/*.SHA256SUMS
          generate_release_notes: true
